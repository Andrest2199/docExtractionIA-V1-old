<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Carga</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Formulario de Carga</h2>
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="fileInput">Seleccionar archivo (JPG o PDF)</label>
                <input type="file" id="fileInput" name="file" accept=".jpg,.jpeg,.pdf" required>
            </div>
            <div class="form-group">
                <label for="serieFolio">SERIE_Y_FOLIO</label>
                <input type="text" id="serieFolio" name="SERIE_Y_FOLIO" required>
            </div>
            <div class="form-group">
                <label for="tipoIncapacidad">TIPO_INCAPACIDAD</label>
                <input type="text" id="tipoIncapacidad" name="TIPO_INCAPACIDAD" required>
            </div>
            <!-- Agregar más campos aquí -->
            <button type="submit">Enviar</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
